<!DOCTYPE html>
<html>
<head>
  <title>AI Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #020617;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      margin: 8px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 75%;
    }

    .user {
      background: #3b82f6;
      align-self: flex-end;
    }

    .ai {
      background: #1e293b;
      align-self: flex-start;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #020617;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>AI Recipe & Chat Assistant 🤖</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Ask anything...">
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const API_KEY = "AIzaSyAlLCdmRoRWZSMyA741-ik5zJNSGIHZIlQ";

function addMessage(text, type) {
  const div = document.createElement("div");
  div.classList.add("msg", type);
  div.innerText = text;

  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop =
    document.getElementById("chat").scrollHeight;
}

async function sendMessage() {
  let input = document.getElementById("input").value;
  if (!input) return;

  addMessage(input, "user");
  document.getElementById("input").value = "";

  // typing indicator
  const typing = document.createElement("div");
  typing.classList.add("msg", "ai");
  typing.innerText = "Typing...";
  document.getElementById("chat").appendChild(typing);

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{
            parts: [{
              text: `You are a helpful AI assistant.
If user asks about food:
- Give recipe
- Ingredients
- Health & nutrition info

User: ${input}`
            }]
          }]
        })
      }
    );

    const data = await response.json();

    typing.remove(); // safe remove

    if (data.candidates && data.candidates.length > 0) {
      const reply = data.candidates[0].content.parts[0].text;
      addMessage(reply, "ai");
    } else {
      addMessage("No response from AI", "ai");
    }

  } catch (error) {
    typing.remove();
    addMessage("Error: " + error.message, "ai");
  }
}
</script>

</body>
</html>
