<!DOCTYPE html>
<html>
<head>
  <title>AI Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 15px;
      background: #020617;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      margin: 6px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 75%;
      white-space: pre-wrap;
    }

    .user {
      background: #2563eb;
      align-self: flex-end;
    }

    .ai {
      background: #1e293b;
      align-self: flex-start;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #020617;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 8px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>AI Chat Assistant 🤖</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Ask anything...">
  <button onclick="sendMessage()">Send</button>
</div>

<script>
// 👉 ONLY CHANGE THIS
const API_KEY = "AIzaSyAlLCdmRoRWZSMyA741-ik5zJNSGIHZIlQ";

function addMessage(text, className) {
  const div = document.createElement("div");
  div.classList.add("msg", className);
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

async function sendMessage() {
  const inputBox = document.getElementById("input");
  const input = inputBox.value.trim();
  if (!input) return;

  addMessage(input, "user");
  inputBox.value = "";

  const typing = document.createElement("div");
  typing.classList.add("msg", "ai");
  typing.innerText = "Typing...";
  document.getElementById("chat").appendChild(typing);

  try {
    const res = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY,
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          contents: [
            {
              parts: [
                {
                  text: "You are a helpful assistant. Answer clearly.\nUser: " + input
                }
              ]
            }
          ]
        })
      }
    );

    const data = await res.json();

    typing.remove();

    if (data.candidates && data.candidates.length > 0) {
      addMessage(data.candidates[0].content.parts[0].text, "ai");
    } else {
      addMessage("No response from AI (check API key / quota)", "ai");
      console.log(data);
    }

  } catch (err) {
    typing.remove();
    addMessage("Error: " + err.message, "ai");
  }
}
</script>

</body>
</html>
