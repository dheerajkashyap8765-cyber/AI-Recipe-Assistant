<!DOCTYPE html>
<html>
<head>
  <title>AI Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #020617;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #333;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      margin: 10px 0;
      max-width: 75%;
      padding: 10px;
      border-radius: 12px;
      line-height: 1.4;
    }

    .user {
      background: #3b82f6;
      align-self: flex-end;
      margin-left: auto;
    }

    .ai {
      background: #1e293b;
      align-self: flex-start;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #020617;
      border-top: 1px solid #333;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>AI Recipe & Chat Assistant 🤖</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Ask anything or type a dish...">
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const API_KEY = AIzaSyAlLCdmRoRWZSMyA741-ik5zJNSGIHZIlQ

function addMessage(text, type) {
  const msg = document.createElement("div");
  msg.classList.add("msg", type);
  msg.innerText = text;
  document.getElementById("chat").appendChild(msg);
  document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

async function sendMessage() {
  let input = document.getElementById("input").value;
  if (!input) return;

  addMessage(input, "user");
  document.getElementById("input").value = "";

  addMessage("Typing...", "ai");

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
      {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          contents: [{
            parts: [{
              text: `You are a smart AI assistant.
If user asks about food:
- Give recipe
- Ingredients
- Health info
- Nutrition

Otherwise answer normally.

User: ${input}`
            }]
          }]
        })
      }
    );

    const data = await response.json();

    let chat = document.getElementById("chat");
    chat.lastChild.remove(); // remove "Typing..."

    if (data.candidates && data.candidates.length > 0) {
      let reply = data.candidates[0].content.parts[0].text;
      addMessage(reply, "ai");
    } else {
      addMessage("⚠️ No response from AI", "ai");
    }

  } catch (error) {
    document.getElementById("chat").lastChild.remove();
    addMessage("❌ Error: " + error.message, "ai");
  }
}
</script>

</body>
</html>
