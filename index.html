<!DOCTYPE html>
<html>
<head>
  <title>AI Assistant</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }
    h2 {
      text-align: center;
    }
    #chat {
      height: 400px;
      overflow-y: auto;
      border: 1px solid #444;
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
      background: #020617;
    }
    input {
      width: 70%;
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
      border: none;
    }
    button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #3b82f6;
      color: white;
    }
  </style>
</head>
<body>

<h2>AI Recipe & Chat Assistant 🤖</h2>

<div id="chat"></div>

<input id="input" placeholder="Ask anything or type dish name...">
<button onclick="sendMessage()">Send</button>

<script>
const API_KEY = AIzaSyAsvhIW8VYT6hp56rqUA4kUICLhX4s8PdY

async function getAIResponse(userInput) {
  const response = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{
          parts: [{
            text: `You are a smart AI assistant.
If user asks about food:
- Give full recipe
- Ingredients
- Cooking time
- Health info (healthy/unhealthy)
- Nutrition (calories, protein, fats)

If general question:
- Answer like ChatGPT

User: ${userInput}`
          }]
        }]
      })
    }
  );

  const data = await response.json();
  return data.candidates[0].content.parts[0].text;
}

async function sendMessage() {
  let input = document.getElementById("input").value;

  document.getElementById("chat").innerHTML += `<p><b>You:</b> ${input}</p>`;

  let reply = await getAIResponse(input);

  document.getElementById("chat").innerHTML += `<p><b>AI:</b> ${reply}</p>`;

  document.getElementById("input").value = "";
}
</script>

</body>
</html>
